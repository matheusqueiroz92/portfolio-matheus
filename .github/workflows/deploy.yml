name: Deploy

# Deploys para a Vercel:
#   - push em `main`         → produção (matheusqueiroz.dev.br)
#   - pull_request aberto    → preview (URL única por PR, comentada pela Vercel)
#
# Depende dos jobs de CI passarem (workflow_run), garantindo que nada quebrado
# chegue em produção.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ---------------------------------------------------------------------------
  # Preview — roda para cada PR. Gera URL única e a Vercel comenta no PR.
  # ---------------------------------------------------------------------------
  preview:
    name: Deploy preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  # ---------------------------------------------------------------------------
  # Produção — só dispara depois que o CI passou em main.
  # ---------------------------------------------------------------------------
  production:
    name: Deploy production
    if: |
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://matheusqueiroz.dev.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
